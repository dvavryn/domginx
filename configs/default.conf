server
{
    listen 127.0.0.1:8080;
    listen 0.0.0.0:8081;

    server_name "example.com" www.example.com;

    root /var/www/html;
    index index.html;

    client_max_body_size 10M;

    keepalive_timeout 75;
    send_timeout 60;

    access_log /var/log/webserv/access.log;
    error_log /var/log/webserv/error.log;

    error_page 404 /errors/404.html;
    error_page 500 /errors/500.html;

    location / {
        root /var/www/html;
        index index.html;
        autoindex off;
        allow_methods GET POST;
        client_max_body_size 5M;
    }

    location /uploads {
        allow_methods POST;
        upload_store /var/www/uploads;
        client_max_body_size 20M;
    }

    location /old-page {
        return 301 /new-page;
    }

    location /images {
        alias /var/www/static/images;
        autoindex on;
        allow_methods GET;
    }

    location /cgi-bin {
        cgi_pass /usr/bin/python3;
        allow_methods GET POST;
    }

    location /files {
        root /var/www;
        try_files /files/index.html /index.html;
        allow_methods GET;
    }
}

